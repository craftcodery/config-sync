name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - 'docs/aws/ConfigSync.swift'
      - 'docs/aws/aws-vault-1password.swift'
      - 'docs/aws/AppIcon.icns'
      - 'docs/aws/MenuBarIcon.png'
      - 'docs/aws/aws-config'
      - 'docs/aws/index.html'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Get latest release version
        id: get_version
        run: |
          # Get the latest tag, default to v0.0.0 if none exists
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Strip 'v' prefix and parse version
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Default to 0 if parsing fails
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          echo "Current version: $MAJOR.$MINOR.$PATCH"
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: bump
        run: |
          MAJOR=${{ steps.get_version.outputs.major }}
          MINOR=${{ steps.get_version.outputs.minor }}
          PATCH=${{ steps.get_version.outputs.patch }}

          # Get commit message
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          # Determine bump type from commit message
          if echo "$COMMIT_MSG" | grep -qi '\[major\]'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            BUMP_TYPE="major"
          elif echo "$COMMIT_MSG" | grep -qi '\[minor\]'; then
            MINOR=$((MINOR + 1))
            PATCH=0
            BUMP_TYPE="minor"
          else
            PATCH=$((PATCH + 1))
            BUMP_TYPE="patch"
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"

          echo "Bump type: $BUMP_TYPE"
          echo "New version: $NEW_VERSION"
          echo "New tag: $NEW_TAG"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT

      - name: Update version in Swift source
        run: |
          NEW_VERSION="${{ steps.bump.outputs.version }}"

          # Update AppVersion.current in ConfigSync.swift
          sed -i "s/static let current = \"[0-9]*\.[0-9]*\.[0-9]*\"/static let current = \"$NEW_VERSION\"/" docs/aws/ConfigSync.swift

          # Verify the change
          grep "static let current" docs/aws/ConfigSync.swift

      - name: Generate release notes
        id: notes
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          # Remove version bump tags from commit message for cleaner release notes
          CLEAN_MSG=$(echo "$COMMIT_MSG" | sed 's/\[major\]//gi; s/\[minor\]//gi; s/\[patch\]//gi' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')

          # If message is just the co-author line or empty, use a default
          if [ -z "$CLEAN_MSG" ] || echo "$CLEAN_MSG" | grep -q "^Co-Authored-By:"; then
            CLEAN_MSG="Bug fixes and improvements."
          fi

          # Take first line as title, rest as body
          TITLE=$(echo "$CLEAN_MSG" | head -n 1)

          echo "Release notes: $TITLE"

          # Use heredoc for multiline output
          {
            echo "notes<<EOF"
            echo "$CLEAN_MSG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            docs/aws/ConfigSync.swift
            docs/aws/aws-vault-1password.swift
            docs/aws/AppIcon.icns
            docs/aws/MenuBarIcon.png
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
