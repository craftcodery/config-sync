name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Process templates
        run: |
          # Read config.json
          CONFIG=$(cat public/config.json)

          # Extract branding values
          ORG_NAME=$(echo "$CONFIG" | jq -r '.branding.orgName')
          APP_NAME=$(echo "$CONFIG" | jq -r '.branding.appName')
          APP_NAME_SHORT=$(echo "$CONFIG" | jq -r '.branding.appNameShort')
          BUNDLE_ID=$(echo "$CONFIG" | jq -r '.branding.bundleId')
          DOMAIN=$(echo "$CONFIG" | jq -r '.branding.domain')
          LOCAL_DIR=$(echo "$CONFIG" | jq -r '.branding.localDir')
          TAGLINE=$(echo "$CONFIG" | jq -r '.branding.tagline')
          OP_ACCOUNT=$(echo "$CONFIG" | jq -r '.onepassword.account')

          # Extract GitHub values
          GITHUB_OWNER=$(echo "$CONFIG" | jq -r '.github.owner')
          GITHUB_REPO=$(echo "$CONFIG" | jq -r '.github.repo')

          # Extract ASCII logo lines
          LOGO_LINE_01=$(echo "$CONFIG" | jq -r '.branding.asciiLogo[0] // empty')
          LOGO_LINE_02=$(echo "$CONFIG" | jq -r '.branding.asciiLogo[1] // empty')
          LOGO_LINE_03=$(echo "$CONFIG" | jq -r '.branding.asciiLogo[2] // empty')
          LOGO_LINE_04=$(echo "$CONFIG" | jq -r '.branding.asciiLogo[3] // empty')
          LOGO_LINE_05=$(echo "$CONFIG" | jq -r '.branding.asciiLogo[4] // empty')
          LOGO_LINE_06=$(echo "$CONFIG" | jq -r '.branding.asciiLogo[5] // empty')
          LOGO_LINE_07=$(echo "$CONFIG" | jq -r '.branding.asciiLogo[6] // empty')
          LOGO_LINE_08=$(echo "$CONFIG" | jq -r '.branding.asciiLogo[7] // empty')
          LOGO_LINE_09=$(echo "$CONFIG" | jq -r '.branding.asciiLogo[8] // empty')
          LOGO_LINE_10=$(echo "$CONFIG" | jq -r '.branding.asciiLogo[9] // empty')
          LOGO_LINE_11=$(echo "$CONFIG" | jq -r '.branding.asciiLogo[10] // empty')
          LOGO_LINE_12=$(echo "$CONFIG" | jq -r '.branding.asciiLogo[11] // empty')

          echo "Processing templates with:"
          echo "  ORG_NAME: $ORG_NAME"
          echo "  DOMAIN: $DOMAIN"
          echo "  GITHUB_OWNER: $GITHUB_OWNER"
          echo "  GITHUB_REPO: $GITHUB_REPO"

          # Process index.html.template (setup script)
          if [[ -f public/index.html.template ]]; then
            cp public/index.html.template public/index.html

            sed -i "s|{{ORG_NAME}}|$ORG_NAME|g" public/index.html
            sed -i "s|{{APP_NAME}}|$APP_NAME|g" public/index.html
            sed -i "s|{{APP_NAME_SHORT}}|$APP_NAME_SHORT|g" public/index.html
            sed -i "s|{{BUNDLE_ID}}|$BUNDLE_ID|g" public/index.html
            sed -i "s|{{DOMAIN}}|$DOMAIN|g" public/index.html
            sed -i "s|{{LOCAL_DIR}}|$LOCAL_DIR|g" public/index.html
            sed -i "s|{{TAGLINE}}|$TAGLINE|g" public/index.html
            sed -i "s|{{OP_ACCOUNT}}|$OP_ACCOUNT|g" public/index.html
            sed -i "s|{{GITHUB_OWNER}}|$GITHUB_OWNER|g" public/index.html
            sed -i "s|{{GITHUB_REPO}}|$GITHUB_REPO|g" public/index.html
            sed -i "s|{{ASCII_LOGO_LINE_01}}|$LOGO_LINE_01|g" public/index.html
            sed -i "s|{{ASCII_LOGO_LINE_02}}|$LOGO_LINE_02|g" public/index.html
            sed -i "s|{{ASCII_LOGO_LINE_03}}|$LOGO_LINE_03|g" public/index.html
            sed -i "s|{{ASCII_LOGO_LINE_04}}|$LOGO_LINE_04|g" public/index.html
            sed -i "s|{{ASCII_LOGO_LINE_05}}|$LOGO_LINE_05|g" public/index.html
            sed -i "s|{{ASCII_LOGO_LINE_06}}|$LOGO_LINE_06|g" public/index.html
            sed -i "s|{{ASCII_LOGO_LINE_07}}|$LOGO_LINE_07|g" public/index.html
            sed -i "s|{{ASCII_LOGO_LINE_08}}|$LOGO_LINE_08|g" public/index.html
            sed -i "s|{{ASCII_LOGO_LINE_09}}|$LOGO_LINE_09|g" public/index.html
            sed -i "s|{{ASCII_LOGO_LINE_10}}|$LOGO_LINE_10|g" public/index.html
            sed -i "s|{{ASCII_LOGO_LINE_11}}|$LOGO_LINE_11|g" public/index.html
            sed -i "s|{{ASCII_LOGO_LINE_12}}|$LOGO_LINE_12|g" public/index.html

            echo "Processed public/index.html"
          fi

          # Process readability.js.template
          if [[ -f public/readability.js.template ]]; then
            cp public/readability.js.template public/readability.js
            sed -i "s|{{ORG_NAME}}|$ORG_NAME|g" public/readability.js
            echo "Processed public/readability.js"
          fi

          # Process demo.tape.template
          if [[ -f public/demo.tape.template ]]; then
            cp public/demo.tape.template public/demo.tape
            sed -i "s|{{ORG_NAME}}|$ORG_NAME|g" public/demo.tape
            sed -i "s|{{APP_NAME}}|$APP_NAME|g" public/demo.tape
            sed -i "s|{{DOMAIN}}|$DOMAIN|g" public/demo.tape
            echo "Processed public/demo.tape"
          fi

          # Process demo-mock.sh.template
          if [[ -f public/demo-mock.sh.template ]]; then
            cp public/demo-mock.sh.template public/demo-mock.sh
            sed -i "s|{{ORG_NAME}}|$ORG_NAME|g" public/demo-mock.sh
            sed -i "s|{{APP_NAME}}|$APP_NAME|g" public/demo-mock.sh
            sed -i "s|{{TAGLINE}}|$TAGLINE|g" public/demo-mock.sh
            sed -i "s|{{ASCII_LOGO_LINE_01}}|$LOGO_LINE_01|g" public/demo-mock.sh
            sed -i "s|{{ASCII_LOGO_LINE_02}}|$LOGO_LINE_02|g" public/demo-mock.sh
            sed -i "s|{{ASCII_LOGO_LINE_03}}|$LOGO_LINE_03|g" public/demo-mock.sh
            sed -i "s|{{ASCII_LOGO_LINE_04}}|$LOGO_LINE_04|g" public/demo-mock.sh
            sed -i "s|{{ASCII_LOGO_LINE_05}}|$LOGO_LINE_05|g" public/demo-mock.sh
            sed -i "s|{{ASCII_LOGO_LINE_06}}|$LOGO_LINE_06|g" public/demo-mock.sh
            sed -i "s|{{ASCII_LOGO_LINE_07}}|$LOGO_LINE_07|g" public/demo-mock.sh
            sed -i "s|{{ASCII_LOGO_LINE_08}}|$LOGO_LINE_08|g" public/demo-mock.sh
            sed -i "s|{{ASCII_LOGO_LINE_09}}|$LOGO_LINE_09|g" public/demo-mock.sh
            sed -i "s|{{ASCII_LOGO_LINE_10}}|$LOGO_LINE_10|g" public/demo-mock.sh
            sed -i "s|{{ASCII_LOGO_LINE_11}}|$LOGO_LINE_11|g" public/demo-mock.sh
            sed -i "s|{{ASCII_LOGO_LINE_12}}|$LOGO_LINE_12|g" public/demo-mock.sh
            chmod +x public/demo-mock.sh
            echo "Processed public/demo-mock.sh"
          fi

      - name: Install VHS and dependencies
        run: |
          # Install ffmpeg and ttyd (required by VHS)
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd

          # Install gum (required by demo-mock.sh)
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y gum

          # Install VHS
          go install github.com/charmbracelet/vhs@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Generate demo GIF
        env:
          CLICOLOR_FORCE: 1
          FORCE_COLOR: 1
        run: |
          cd public
          if [[ -f demo.tape ]]; then
            echo "Generating demo.gif from demo.tape..."
            $HOME/go/bin/vhs demo.tape
            echo "Generated demo.gif"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
